<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LuxeStay — Sign In</title>
  <link rel="stylesheet" href="../../shared/css/globals.css" />
  <link rel="stylesheet" href="../../shared/css/styleguide.css" />
  <link rel="stylesheet" href="../../shared/css/components.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-body">
  <div class="auth-layout">
    <div class="auth-panel-left">
      <div class="auth-panel-overlay"></div>
      <div class="auth-panel-content">
        <a href="../../home/html/index.html" class="auth-logo">LuxeStay</a>
        <blockquote class="auth-quote">"Every great journey starts with a single booking."</blockquote>
        <div class="auth-panel-stats">
          <div><div class="auth-panel-stat-num">1,200+</div><div class="auth-panel-stat-label">Hotels</div></div>
          <div><div class="auth-panel-stat-num">40+</div><div class="auth-panel-stat-label">Countries</div></div>
          <div><div class="auth-panel-stat-num">4.9★</div><div class="auth-panel-stat-label">Avg Rating</div></div>
        </div>
      </div>
    </div>
    <div class="auth-panel-right">
      <div class="auth-form-wrap">
        <a href="../../home/html/index.html" class="auth-back-link">← Back to Home</a>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your LuxeStay account</p>
        <form action="../../home/html/index.html" method="get">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" name="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" name="password" placeholder="••••••••" required />
          </div>
          <div class="auth-remember-row">
            <label class="form-check"><input type="checkbox" name="remember" /> Remember me</label>
            <a href="./forgot-password.html" class="auth-forgot-link">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-teal btn-full btn-lg">Sign In</button>
        </form>
        <p class="auth-switch-text">Don't have an account? <a href="./signup.html" class="auth-switch-link">Create one free</a></p>
      </div>
    </div>
  </div>
</body>
</html>
