<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="../../shared/css/globals.css" />
  <link rel="stylesheet" href="../../shared/css/styleguide.css" />
  <link rel="stylesheet" href="../../shared/css/components.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
<div class="auth-layout">

    <div class="auth-panel-left">
      <div class="auth-panel-overlay"></div>
      <div class="auth-panel-content">
        <a href="../../home/html/index.html" class="auth-logo">LuxeStay</a>
        <blockquote class="auth-quote">"A fresh start — set a strong password and get back to exploring."</blockquote>
      </div>
    </div>

    <div class="auth-panel-right">
      <div class="auth-form-wrap">
        <div style="font-size:48px;margin-bottom:16px;">🔒</div>
        <h1 class="auth-title">Set new password</h1>
        <p class="auth-subtitle">Choose a strong password for your account.</p>

        <div id="reset-error" class="auth-error" style="display:none;"></div>
        <div id="reset-invalid" style="display:none;background:#fff0ee;border:1px solid var(--coral);border-radius:12px;padding:20px 24px;">
          <div style="font-weight:700;color:var(--coral);margin-bottom:6px;">⚠️ Invalid or expired link</div>
          <div style="font-size:14px;">This reset link has expired. <a href="./forgot-password.html" style="color:var(--teal);">Request a new one.</a></div>
        </div>

        <form action="./login.html" method="get" id="reset-form" novalidate>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <div class="input-with-toggle">
              <input type="password" class="form-input" id="reset-pw" placeholder="Min. 8 characters" required minlength="8">
              <button type="button" class="pw-toggle" id="reset-pw-toggle">👁</button>
            </div>
            <div class="pw-strength" id="reset-pw-strength"></div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input type="password" class="form-input" id="reset-pw-confirm" placeholder="Repeat password" required>
          </div>
          <button type="submit" class="btn btn-teal btn-full btn-lg" id="reset-btn">Reset Password</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
